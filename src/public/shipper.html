<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KHANG MIỀN TÂY - Đội Ngũ Shipper</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f6f9; }
        .batch-card { background: #d4edda; border-left: 5px solid #28a745; padding: 15px; margin-bottom: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); animation: chop_nhay 1s infinite alternate; }
        @keyframes chop_nhay { from { box-shadow: 0 0 4px #dc3545; } to { box-shadow: 0 0 16px #dc3545; } }
        .batch-delivering { background: #cce5ff; border-left: 5px solid #004085; animation: none; }
        button { padding: 10px 20px; font-weight: bold; border: none; cursor: pointer; border-radius: 4px; color: white; }
        .btn-nhan { background: #28a745; }
        .btn-xong { background: #007bff; }
        .btn-excel { background: #17a2b8; width: 100%; padding: 12px; font-size: 16px; margin-top: 30px; }
    </style>
</head>
<body>
    <h2>🛵 ĐỘI NGŨ SHIPPER - KHANG MIỀN TÂY</h2>
    <button style="background: #6c757d; padding: 8px 15px;" onclick="layDanhSachDot()">🔄 Cập nhật chuyến xe mới</button>
    
    <h3>🚨 Các Đợt Giao Hàng Đang Chờ / Đang Chạy:</h3>
    <div id="list-batches"></div>

    <hr>
    <button class="btn-excel" onclick="xuatExcel()">📊 CUỐI NGÀY: Xuất Toàn Bộ Báo Cáo Excel Gửi Đại Ca</button>

    <script>
        async function layDanhSachDot() {
            // Lấy tất cả các đợt giao và thông tin đơn con từ server
            const resBatch = await fetch('/api/batches');
            const batches = await resBatch.json();
            const resOrder = await fetch('/api/orders');
            const orders = await resOrder.json();

            const listDiv = document.getElementById('list-batches');
            listDiv.innerHTML = '';

            // Chỉ lọc những đợt chưa hoàn thành (READY hoặc DELIVERING)
            const activeBatches = batches.filter(b => b.status !== 'DONE');
            
            if(activeBatches.length === 0) {
                listDiv.innerHTML = '<p style="color: #666;">Chưa có chuyến hàng nào được gom từ quầy pha chế.</p>';
                return;
            }

            activeBatches.forEach(b => {
                // Tìm danh sách nội dung các đơn con nằm trong đợt này
                let contentDetails = '';
                b.orderIds.forEach(id => {
                    const ord = orders.find(o => o.id === id);
                    if(ord) contentDetails += `<li><strong>Đơn #${ord.id} [🕒 ${ord.time || ord.deliveryTime}]:</strong> ${ord.content} (📍 Ghi chú: ${ord.note || 'Không'})</li>`;
                });

                const isDelivering = b.status === 'DELIVERING';
                
                listDiv.innerHTML += `
                    <div class="batch-card ${isDelivering ? 'batch-delivering' : ''}">
                        <h3>📦 ĐỢT GIAO HÀNG #${b.id} (${isDelivering ? 'ĐANG ĐI GIAO' : 'ĐANG GỌI SHIP!'})</h3>
                        <p>👤 <strong>Shipper phụ trách:</strong> ${b.shipperName}</p>
                        <p><strong>Danh sách đơn con cần đi (${b.orderIds.length} đơn):</strong></p>
                        <ul>${contentDetails}</ul>
                        
                        ${!isDelivering 
                            ? `<button class="btn-nhan" onclick="capNhatDot(${b.id}, 'DELIVERING')">🛵 BẤM ĐỂ NHẬN CHẠY ĐỢT NÀY</button>`
                            : `<button class="btn-xong" onclick="capNhatDot(${b.id}, 'DONE')">✅ ĐÃ GIAO XONG TOÀN BỘ ĐỢT NÀY</button>`
                        }
                    </div>
                `;

                // Nếu có đợt READY mới, phát tiếng chuông báo hiệu cho shipper
                if(!isDelivering) {
                    try {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = ctx.createOscillator();
                        osc.connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + 0.2);
                    } catch(e){}
                }
            });
        }

        async function capNhatDot(id, status) {
            const res = await fetch(`/api/batches/${id}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            const data = await res.json();
            if(data.success) {
                alert(status === 'DELIVERING' ? 'Đã nhận đợt thành công, lên xe chạy cẩn thận ông ơi!' : 'Tuyệt vời, đã hoàn thành chuyến xe!');
                layDanhSachDot();
            }
        }

        async function xuatExcel() {
            const res = await fetch('/api/export-excel', { method: 'POST' });
            const data = await res.json();
            if(data.success) alert('Đã tạo thành công file Excel trên hệ thống!');
        }

        layDanhSachDot();
        setInterval(layDanhSachDot, 8000); // Tự động reload sau mỗi 8 giây
    </script>
</body>
</html>
