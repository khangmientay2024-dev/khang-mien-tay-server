<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>.batch { border: 2px solid green; padding: 10px; margin: 10px; }</style>
</head>
<body>
    <h2>ĐỘI NGŨ SHIPPER</h2>
    <div id="list"></div>
    <script>
        async function load() {
            const [bRes, oRes] = await Promise.all([fetch('/api/batches'), fetch('/api/orders')]);
            const batches = await bRes.json();
            const orders = await oRes.json();
            document.getElementById('list').innerHTML = batches.filter(b => b.status !== 'DONE').map(b => `
                <div class="batch">
                    <h3>Đợt #${b.id} - ${b.shipperName}</h3>
                    ${b.orderIds.map(id => {
                        const o = orders.find(x => x.id == id);
                        return `<div>${o.content} <button onclick="done(${o.id})">✔️ Giao Xong</button></div>`;
                    }).join('')}
                    <button onclick="start(${b.id})">NHẬN CHUYẾN</button>
                </div>
            `).join('');
        }
        async function done(id) { await fetch(`/api/orders/${id}/status`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'DONE'})}); load(); }
        async function start(id) { await fetch(`/api/batches/${id}/status`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'DELIVERING'})}); load(); }
        setInterval(load, 3000); load();
    </script>
</body>
</html>
