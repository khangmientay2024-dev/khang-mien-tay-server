<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KHANG MIỀN TÂY - Ứng Dụng Shipper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-global: #f1f5f9; --text-main: #1e293b; --primary: #4f46e5; --success: #10b981; --card-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-global); color: var(--text-main); padding: 15px 10px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        h3 { font-size: 14px; font-weight: 600; color: #475569; margin: 15px 0 8px 0; text-transform: uppercase; }
        
        /* ĐƠN ĐANG PHA CHẾ BẾP */
        .box-waiting-kitchen { background: #fff7ed; border: 1px solid #ffedd5; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .kitchen-item { font-size: 13px; color: #c2410c; padding: 4px 0; border-bottom: 1px dashed #fed7aa; }

        .batch-card { background: var(--card-bg); padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .batch-header { display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; margin-bottom: 10px; }
        .order-li { background: #f8fafc; padding: 10px; margin-bottom: 6px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .phone-call-link { font-weight: 600; color: white; background: #dc2626; padding: 4px 8px; border-radius: 4px; text-decoration: none; font-size: 12px; display: inline-block; margin-top: 4px; }
        .btn-tick { background: var(--success); color: white; border: none; padding: 6px 12px; font-weight: 600; border-radius: 6px; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; font-weight: 600; border-radius: 8px; cursor: pointer; }
        
        /* THANH ĐỊNH VỊ */
        .gps-status { background: #e0f2fe; color: #0369a1; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 600; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 ĐỘI NGŨ SHIPPER - KHANG MIỀN TÂY</h2>
        
        <div id="gps-ui" class="gps-status">📡 Đang kích hoạt định vị vệ tinh GPS toàn thời gian...</div>

        <div class="box-waiting-kitchen">
            <strong>⏳ ĐƠN QUÁN ĐANG PHA CHẾ (Chờ gom chuyến):</strong>
            <div id="kitchen-orders-list" style="margin-top: 5px;">Đang tải dữ liệu từ quầy nước...</div>
        </div>

        <h3>🚨 CHUYẾN HÀNG CỦA BẠN:</h3>
        <div id="list-batches"></div>
    </div>

    <script>
        let tenShipperCuaToi = "";

        async function layDanhSach() {
            const resBatch = await fetch('/api/batches');
            const batches = await resBatch.json();
            const resOrder = await fetch('/api/orders');
            const orders = await resOrder.json();

            // 1. Hiển thị đơn đang chờ pha chế tại quán cho shipper coi
            const kitchenDiv = document.getElementById('kitchen-orders-list');
            const pendings = orders.filter(o => o.status === 'PENDING');
            if(pendings.length === 0) {
                kitchenDiv.innerHTML = '🎉 Bếp đang trống đơn, có thể chạy về lấy ngay!';
            } else {
                kitchenDiv.innerHTML = pendings.map(o => `<div class="kitchen-item">⏱️ Đơn #${o.id} [${o.createdAt}] - ${o.content}</div>`).join('');
            }

            // 2. Hiển thị đợt giao hàng cần đi chạy
            const listDiv = document.getElementById('list-batches');
            listDiv.innerHTML = '';
            const activeBatches = batches.filter(b => b.status !== 'DONE');

            if(activeBatches.length === 0) {
                listDiv.innerHTML = '<div style="color:gray; padding:20px; text-align:center;">Chưa có chuyến mới gom cho bạn.</div>';
                return;
            }

            activeBatches.forEach(b => {
                let listOrdersHTML = '';
                const isDelivering = b.status === 'DELIVERING';

                b.orderIds.forEach(id => {
                    const ord = orders.find(o => o.id === id);
                    if(ord) {
                        const isSingleDone = ord.status === 'DONE';
                        let callBtn = ord.phone ? `<br><a href="tel:${ord.phone}" class="phone-call-link">📞 GỌI KHÁCH</a>` : '';
                        
                        listOrdersHTML += `
                            <div class="order-li" style="${isSingleDone ? 'opacity:0.4; background:#e2e8f0;' : ''}">
                                <div>📦 <strong>Đơn #${ord.id}:</strong> ${ord.content} ${isSingleDone ? '' : callBtn}</div>
                                ${(!isSingleDone && isDelivering) 
                                    ? `<button class="btn-tick" onclick="giaoXongLe(${ord.id})">Xong</button>` 
                                    : (isSingleDone ? '<b style="color:green">✓ Đã giao</b>' : '')}
                            </div>`;
                    }
                });

                listDiv.innerHTML += `
                    <div class="batch-card">
                        <div class="batch-header">
                            <span style="color:#1e3a8a">📦 ĐỢT CHẠY #${b.id}</span>
                            <span style="color:${isDelivering?'blue':'orange'}">${isDelivering?'Đang giao':'Chờ nhận'}</span>
                        </div>
                        <div style="font-size:12px; margin-bottom:10px;">👤 Tài xế phụ trách: <b>${b.shipperName}</b></div>
                        <div>${listOrdersHTML}</div>
                        ${!isDelivering 
                            ? `<button class="btn-primary" onclick="nhanChuyenDiGiao(${b.id}, '${b.shipperName}')">🛵 BẤM NHẬN CHẠY ĐỢT NÀY</button>` 
                            : ''}
                    </div>`;
            });
        }

        async function nhanChuyenDiGiao(batchId, name) {
            // Lưu lại tên tài xế để kích hoạt GPS định vị
            if(!tenShipperCuaToi) {
                tenShipperCuaToi = name;
                kichHoatDinhViToaDo();
            }
            await fetch(`/api/batches/${batchId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'DELIVERING' })
            });
            layDanhSach();
        }

        async function giaoXongLe(orderId) {
            if(confirm('Xác nhận đã giao thành công và thu tiền đơn này?')) {
                await fetch(`/api/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'DONE' })
                });
                layDanhSach();
            }
        }

        // TÍNH NĂNG 4: TỰ ĐỘNG CHẠY NGẦM BẮN TỌA ĐỘ GPS VỀ QUÁN CHO BẾP THEO DÕI
        function kichHoatDinhViToaDo() {
            if (navigator.geolocation) {
                // watchPosition giúp cập nhật liên tục mỗi khi shipper dịch chuyển ngoài đường
                navigator.geolocation.watchPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    document.getElementById('gps-ui').innerHTML = `🟢 GPS ĐANG BẬT - Đang chia sẻ vị trí của [${tenShipperCuaToi}] về quán...`;
                    
                    // Gửi tọa độ lên máy chủ
                    await fetch('/api/shipper/location', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ shipperName: tenShipperCuaToi, lat, lng })
                    });
                }, (error) => {
                    document.getElementById('gps-ui').innerHTML = `🔴 LỖI GPS: Hãy cho phép trình duyệt truy cập định vị Vị trí (Location)!`;
                }, { enableHighAccuracy: true });
            }
        }

        setInterval(layDanhSach, 5000);
        layDanhSach();
    </script>
</body>
</html>
