<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KHANG MIỀN TÂY - Bếp & Điều Phối</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-global: #f8fafc; --text-main: #0f172a; --primary: #2563eb; --success: #10b981; --card-bg: #ffffff; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-global); color: var(--text-main); padding: 20px 10px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h2 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 15px; }
        h3 { font-size: 15px; font-weight: 600; margin: 20px 0 10px 0; color: #475569; border-left: 4px solid var(--primary); padding-left: 8px; }
        
        .box-nhap { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); margin-bottom: 15px; border: 1px solid var(--border); }
        textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; min-height: 80px; margin-bottom: 10px; }
        .btn { padding: 12px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 14px; }
        .btn-success { background: var(--success); color: white; }
        .btn-excel { background: #1e293b; color: white; margin-top: 10px; }
        
        /* RADAR GPS */
        .box-radar { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .shipper-loc-item { display: inline-flex; align-items: center; background: white; padding: 6px 12px; border-radius: 6px; border: 1px solid #dcfce7; margin-right: 8px; margin-top: 6px; font-size: 13px; }
        .btn-map { background: #16a34a; color: white; text-decoration: none; padding: 3px 8px; border-radius: 4px; margin-left: 8px; font-size: 11px; font-weight: 600; }

        /* THẺ ĐƠN HÀNG */
        .order-list-container { display: flex; flex-direction: column; gap: 8px; }
        .order-card { background: white; border: 1px solid var(--border); padding: 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .phone-highlight { background: #fef3c7; padding: 2px 6px; border-radius: 4px; font-weight: 600; color: #b45309; }
        .badge-shipper { background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 12px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>☕ KHANG MIỀN TÂY - MÀN HÌNH ĐIỀU PHỐI</h2>

        <div class="box-radar">
            <strong style="color: #166534; font-size: 14px;">📍 RADAR ĐỊNH VỊ SHIPPER ĐANG LÀM VIỆC (24/7):</strong>
            <div id="shipper-radar-list" style="margin-top: 5px; font-size: 13px; color: gray;">Đang dò tìm sóng GPS từ app shipper...</div>
        </div>

        <div class="box-nhap">
            <textarea id="orderContent" placeholder="Dán hóa đơn, nội dung tin nhắn chốt đơn vào đây..."></textarea>
            <button class="btn btn-success" onclick="taoDonHang()">🚀 XỬ LÝ & ĐẨY XUỐNG BẾP PHA CHẾ</button>
            <button class="btn btn-excel" onclick="window.location.href='/api/export-excel'">📥 TẢI FILE EXCEL BÁO CÁO DOANH THU</button>
        </div>

        <h3>⏳ 1. ĐƠN CHỜ PHA CHẾ TRONG BẾP / CHỜ SHIP HỐT ĐI:</h3>
        <div id="list-pending" class="order-list-container"></div>

        <h3>🛵 2. ĐƠN ĐANG TRÊN ĐƯỜNG ĐI GIAO (REAL-TIME):</h3>
        <div id="list-shipping" class="order-list-container"></div>

        <h3>✅ 3. LỊCH SỬ ĐƠN ĐÃ GIAO THÀNH CÔNG (CÓ DẤU TICK XONG):</h3>
        <div id="list-done" class="order-list-container"></div>
    </div>

    <script>
        async function taoDonHang() {
            const content = document.getElementById('orderContent').value;
            if(!content.trim()) return;

            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            const data = await res.json();
            
            // Nếu bị trùng đơn, báo lỗi ngay lập tức
            if(!res.ok && data.isDuplicate) {
                alert(data.error); 
                return;
            }

            document.getElementById('orderContent').value = '';
            layDuLieu();
        }

        async function layDuLieu() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();

                const pDiv = document.getElementById('list-pending');
                const sDiv = document.getElementById('list-shipping');
                const dDiv = document.getElementById('list-done');

                pDiv.innerHTML = ''; sDiv.innerHTML = ''; dDiv.innerHTML = '';

                orders.forEach(o => {
                    let text = o.content;
                    if(o.phone) text = text.replace(o.phone, `<span class="phone-highlight">${o.phone}</span>`);

                    const cardHTML = `
                        <div class="order-card">
                            <div>
                                <strong>#${o.id}</strong> [${o.createdAt}] - ${text}
                                ${o.shipperName ? `<br><span class="badge-shipper">👤 Người giao: ${o.shipperName}</span>` : ''}
                            </div>
                            <div>
                                ${o.status === 'PENDING' ? `<button class="btn-delete" onclick="xoaDon(${o.id})">Hủy đơn</button>` : ''}
                                ${o.status === 'SHIPPING' ? `<b style="color:blue; font-size:13px;">⚡ ĐANG GIAO...</b>` : ''}
                                ${o.status === 'DONE' ? `<b style="color:green; font-size:13px;">✅ ĐÃ GIAO XONG ✓</b>` : ''}
                            </div>
                        </div>`;

                    if(o.status === 'PENDING') pDiv.innerHTML += cardHTML;
                    else if(o.status === 'SHIPPING') sDiv.innerHTML += cardHTML;
                    else if(o.status === 'DONE') dDiv.innerHTML += cardHTML;
                });

                if(!pDiv.innerHTML) pDiv.innerHTML = '<div style="color:gray;font-size:13px;padding:5px;">Hiện tại quán đang trống đơn chờ pha chế.</div>';
                if(!sDiv.innerHTML) sDiv.innerHTML = '<div style="color:gray;font-size:13px;padding:5px;">Chưa có shipper nào đi ngoài đường.</div>';
                if(!dDiv.innerHTML) dDiv.innerHTML = '<div style="color:gray;font-size:13px;padding:5px;">Chưa có đơn hoàn thành.</div>';
            } catch(e){}
        }

        async function xoaDon(id) {
            if(confirm('Ông có chắc muốn hủy bỏ đơn hàng này không?')) {
                await fetch(`/api/orders/${id}`, { method: 'DELETE' });
                layDuLieu();
            }
        }

        async function capNhatRadarShipper() {
            try {
                const res = await fetch('/api/shipper/locations');
                const locations = await res.json();
                const radarDiv = document.getElementById('shipper-radar-list');
                
                if(Object.keys(locations).length === 0) {
                    radarDiv.innerHTML = 'Hiện chưa có shipper nào mở app đăng nhập ca làm.';
                    return;
                }
                
                radarDiv.innerHTML = '';
                for(let name in locations) {
                    const loc = locations[name];
                    const googleMapsUrl = `https://www.google.com/maps?q=${loc.lat},${loc.lng}`;
                    radarDiv.innerHTML += `
                        <div class="shipper-loc-item">
                            🟢 <strong>${name}</strong> (Cập nhật: ${loc.updatedAt})
                            <a href="${googleMapsUrl}" target="_blank" class="btn-map">📍 XEM VỊ TRÍ TRÊN MAPS</a>
                        </div>`;
                }
            } catch(e){}
        }

        setInterval(layDuLieu, 3000);
        setInterval(capNhatRadarShipper, 4000);
        layDuLieu();
        capNhatRadarShipper();
    </script>
</body>
</html>
