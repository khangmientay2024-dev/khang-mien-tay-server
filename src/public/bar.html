<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .order-card { display: flex; align-items: center; gap: 15px; border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .check-box { width: 30px; height: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>ĐIỀU PHỐI PHA CHẾ</h2>
    <textarea id="txt" rows="3" style="width:100%"></textarea>
    <button onclick="add()">THÊM ĐƠN</button>
    <hr>
    <input id="shipper" placeholder="Tên shipper...">
    <button onclick="sendBatch()">BẮN ĐỢT CHO SHIPPER</button>
    <div id="list"></div>

    <script>
        async function load() {
            const res = await fetch('/api/orders');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.filter(o => o.status === 'PENDING').map(o => `
                <div class="order-card">
                    <input type="checkbox" class="check-box" value="${o.id}">
                    <span>Đơn #${o.id}: ${o.content}</span>
                </div>
            `).join('');
        }
        async function add() {
            await fetch('/api/orders', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content: document.getElementById('txt').value})});
            load();
        }
        async function sendBatch() {
            const ids = Array.from(document.querySelectorAll('.check-box:checked')).map(c => c.value);
            await fetch('/api/batches', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({orderIds: ids, shipperName: document.getElementById('shipper').value})});
            alert('Đã gửi!'); load();
        }
        load();
    </script>
</body>
</html>
